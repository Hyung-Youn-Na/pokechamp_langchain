# LangChain + vLLM configuration
# Mirrors vllm_config.yaml defaults for the vLLM OpenAI-compatible server.

model: "Qwen/Qwen3.6-27B"
base_url: "http://172.17.0.1:18043/v1"
api_key: "vllm"
temperature: 0.7
top_p: 0.8
presence_penalty: 1.5
max_tokens: 32768
json_format: true
seed: null
stop: []

# vLLM-specific parameters
extra_body:
  top_k: 20
  chat_template_kwargs:
    enable_thinking: false

# LangGraph settings
max_retries: 3

# Per-node LLM overrides (override global settings above).
# Nodes not listed here use the global defaults.
# Temperature tuning rationale:
#   - Analysis nodes (battlefield, roles, matchups, damage): low temperature for factual accuracy
#   - Creative nodes (tactical plans): higher temperature for diverse ideas
#   - Prediction/evaluation/select: low temperature for consistent, reasoned output

nodes:
  analyze_battlefield:
    temperature: 0.3
    max_tokens: 1024
  analyze_roles:
    temperature: 0.3
    max_tokens: 1024
  assess_matchups:
    temperature: 0.2
    max_tokens: 1024
  evaluate_damage:
    temperature: 0.1
    max_tokens: 1024
  generate_tactical_plans:
    temperature: 0.8
    max_tokens: 2048
  predict_opponent:
    temperature: 0.5
    max_tokens: 1024
  evaluate_plans:
    temperature: 0.3
    max_tokens: 1024
  select_action:
    temperature: 0.1
    max_tokens: 256
